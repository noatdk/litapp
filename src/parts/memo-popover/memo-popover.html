<div class="memo-editor">
  <header class="memo-editor__head">
    <ion-icon [name]="iconName"></ion-icon>
    <h2>{{ memoHeaderKey | translate }}</h2>
  </header>

  <textarea
    class="memo-editor__textarea"
    [(ngModel)]="memo"
    placeholder="{{ 'MEMO_PLACEHOLDER' | translate }}"
    autofocus
  ></textarea>

  <footer class="memo-editor__actions">
    <button
      type="button"
      class="memo-btn memo-btn--danger"
      (click)="clear()"
      *ngIf="memos.has(kind, id)"
    >
      {{ 'DELETE_BUTTON' | translate }}
    </button>
    <span class="memo-editor__spacer"></span>
    <button type="button" class="memo-btn memo-btn--ghost" (click)="cancel()">
      {{ 'CANCEL_BUTTON' | translate }}
    </button>
    <button type="button" class="memo-btn memo-btn--primary" (click)="save()">
      {{ 'DONE_BUTTON' | translate }}
    </button>
  </footer>
</div>
