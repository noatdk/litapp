<ion-header>
  <ion-navbar>
    <ion-title>{{'SERIES_TITLE' | translate}}</ion-title>
    <ion-buttons end>
      <button
        ion-button
        icon-only
        (click)="openSeriesMemo($event)"
        [tooltip]="'MEMO_SERIES_BUTTON' | translate"
        event="press"
        navTooltip
      >
        <ion-icon [name]="memos.hasSeriesMemo(seriesId) ? 'albums' : 'albums-outline'"></ion-icon>
      </button>
      <button ion-button icon-only (click)="download()" [tooltip]="'DOWNLOAD_ALL_BUTTON' | translate" event="press" navTooltip>
        <ion-icon name="download"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <p class="memo" *ngIf="memos.hasSeriesMemo(seriesId)" (click)="openSeriesMemo($event)">
    <strong><ion-icon name="albums" color="secondary"></ion-icon> {{ 'MEMO_SERIES_TITLE' | translate }}: </strong>
    {{ memos.getSeriesMemo(seriesId) }}
  </p>
  <story-list [stories]="series"></story-list>
</ion-content>
