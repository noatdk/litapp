<ion-header>
  <ion-navbar>
    <ion-title>{{ 'FOLLOWING_TITLE' | translate }}</ion-title>

    <ion-buttons end>
      <button
        end
        ion-button
        icon-only
        (click)="openExportPopover($event)"
        [tooltip]="'LISTVIEW_EXPORT' | translate"
        event="press"
        navTooltip
      >
        <ion-icon name="code-download"></ion-icon>
      </button>
      <button end ion-button icon-only (click)="toggleSorting()" [tooltip]="'FOLLOWING_TOOLTIP_SORT' | translate" event="press" navTooltip>
        {{ ('FOLLOWING_SORT_' +sortingProp.toUpperCase()) | translate }} &nbsp;
        <ion-icon name="funnel"></ion-icon>
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <ion-list>
    <author-list-item
      *ngFor="let author of (sortingProp ? (authors | orderBy: sortingProp) : authors)"
      [author]="author"
      [showFollowToggle]="true"
      (itemClick)="showAuthor(author)"
      (followToggle)="followToggle($event.author, $event.event)"
    ></author-list-item>
  </ion-list>
</ion-content>
