<ion-header>
  <ion-navbar>
    <ion-title>
      {{ titleKey | translate }}
      <small *ngIf="total"> ({{ total | number }})</small>
    </ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <ion-searchbar
    [(ngModel)]="query"
    (ionInput)="onSearch($event)"
    (ionClear)="clearSearch()"
    placeholder="Search by username"
    debounce="350"
    cancelButtonText="Cancel"
  >
  </ion-searchbar>

  <p *ngIf="searching" class="hint"><ion-icon name="search"></ion-icon> Looking up “{{ query }}”…</p>
  <p *ngIf="exactMissed" class="hint hint--miss">
    No user named “{{ query }}” — showing matches in the loaded list.
  </p>

  <p *ngIf="!loading && !filtered.length && !searching" class="empty-placeholder">
    {{ query ? 'No matches.' : ('USERLIST_EMPTY' | translate) }}
  </p>

  <author-list *ngIf="filtered.length" [authors]="filtered" (itemClick)="openUser($event)"></author-list>

  <ion-infinite-scroll *ngIf="!query" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
