# Must live on the repo default branch. Dispatches Integration CI on fork/integration daily.

name: Integration CI schedule

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly-integration.yml',
              ref: 'fork/integration',
            });
