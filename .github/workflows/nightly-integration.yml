# Runs on push / workflow_dispatch for fork/integration.
# Daily trigger: default-branch workflow integration-ci-scheduled.yml dispatches this file on ref fork/integration.

name: Integration CI

on:
  push:
    branches:
      - 'fork/integration'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork/integration
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'push' && github.sha || 'fork/integration' }}

      - name: Detect Android signing (do not use secrets in step if)
        id: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain missing APK release (secrets)
        if: steps.android.outputs.sign != 'true'
        run: |
          echo "::notice::No GitHub Release/APK: add Actions secrets ANDROID_KEYSTORE_BASE64 (base64 .jks) and ANDROID_KEYSTORE_PASSWORD (store + key password; alias litapp unless ANDROID_KEY_ALIAS is set). Until then this job only validates the branch."

      - name: Export env for in-app update manifest
        shell: bash
        run: |
          echo "APP_JSON_RAW_BASE=https://raw.githubusercontent.com/${{ github.repository }}/fork/integration" >> "$GITHUB_ENV"
          echo "GITHUB_TAGS_REPO=${{ github.repository }}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '11.x'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node11-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node11-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      - name: Environment bootstrap (setup.js)
        run: npm run ionic:build:before

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run test:typing

      - name: Bump Android nightly version (before builds)
        if: steps.android.outputs.sign == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bash .github/scripts/bump-android-nightly.sh

      - name: Cache www/ build output
        id: cache-www
        uses: actions/cache@v4
        with:
          path: www
          key: www-${{ hashFiles('src/**', 'package-lock.json', 'setup.js', 'package.json') }}

      - name: Production build (creates www/ for Cordova project detection)
        if: steps.cache-www.outputs.cache-hit != 'true'
        run: npm run build

      - name: Setup Java 17 (cmdline-tools sdkmanager needs JDK 17+ on ubuntu-latest)
        if: steps.android.outputs.sign == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK packages (runner image)
        if: steps.android.outputs.sign == 'true'
        run: |
          set -euo pipefail
          ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ROOT" >> "$GITHUB_ENV"
          if [[ -d "$ROOT/platforms/android-27" && -d "$ROOT/build-tools/27.0.3" ]]; then
            echo "SDK components already present, skipping sdkmanager."
            exit 0
          fi
          SM="$ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SM" ]]; then
            SM="$(find "$ROOT/cmdline-tools" -maxdepth 5 -name sdkmanager -type f -executable 2>/dev/null | head -1)"
          fi
          if [[ ! -x "${SM:-}" ]]; then
            echo "::error::sdkmanager not found under $ROOT/cmdline-tools"
            exit 1
          fi
          (yes || true) | "$SM" --licenses >/dev/null 2>&1 || true
          "$SM" "platforms;android-27" "build-tools;27.0.3"

      - name: Setup Java 8 (cordova-android 7 requires JDK 1.8)
        if: steps.android.outputs.sign == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle 4.10.3 distribution
        if: steps.android.outputs.sign == 'true'
        uses: actions/cache@v4
        with:
          path: ~/gradle-dist/gradle-4.10.3
          key: gradle-dist-4.10.3

      - name: Install Gradle 4.10.3 (cordova-android 7 compatible)
        if: steps.android.outputs.sign == 'true'
        run: |
          set -euo pipefail
          GRADLE_VER=4.10.3
          GRADLE_DIR="${HOME}/gradle-dist/gradle-${GRADLE_VER}"
          if [[ ! -x "${GRADLE_DIR}/bin/gradle" ]]; then
            mkdir -p "${HOME}/gradle-dist"
            curl -sSL "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -o "${RUNNER_TEMP}/gradle.zip"
            unzip -q "${RUNNER_TEMP}/gradle.zip" -d "${HOME}/gradle-dist"
          fi
          echo "${GRADLE_DIR}/bin" >> "$GITHUB_PATH"

      - name: Inject JCenter mirror init script (jcenter sunset 2021)
        if: steps.android.outputs.sign == 'true'
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle <<'EOF'
          allprojects {
              buildscript {
                  repositories {
                      mavenCentral()
                      google()
                      maven { url 'https://maven.aliyun.com/repository/jcenter' }
                      maven { url 'https://maven.aliyun.com/repository/public' }
                  }
              }
              repositories {
                  mavenCentral()
                  google()
                  maven { url 'https://maven.aliyun.com/repository/jcenter' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
              }
          }
          EOF

      - name: Decode Android keystore
        if: steps.android.outputs.sign == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/litapp-release.jks"

      - name: Cache Cordova platforms and plugins
        if: steps.android.outputs.sign == 'true'
        uses: actions/cache@v4
        with:
          path: |
            platforms
            plugins
          key: ${{ runner.os }}-cordova-${{ hashFiles('config.xml') }}
          restore-keys: |
            ${{ runner.os }}-cordova-

      - name: Cache Gradle
        if: steps.android.outputs.sign == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('config.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cordova Android platform and prepare
        if: steps.android.outputs.sign == 'true'
        run: |
          set -uo pipefail
          if [[ ! -d platforms/android ]]; then
            # cordova-lib v8 exits 1 after a clean save when cordova-plugin-device
            # advertises a cordova-electron engine it can't resolve. The platform
            # is actually created; verify on disk and continue.
            ./node_modules/.bin/cordova platform add android --no-interactive || true
            if [[ ! -d platforms/android ]]; then
              echo "::error::cordova platform add failed (platforms/android missing)"
              exit 1
            fi
          fi
          set -e
          ./node_modules/.bin/cordova prepare android --no-interactive

      - name: Build Android release APK
        if: steps.android.outputs.sign == 'true'
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          alias="${KEY_ALIAS:-litapp}"
          ./node_modules/.bin/cordova build android --release --no-interactive -- \
            --minSdkVersion=19 \
            --keystore="${RUNNER_TEMP}/litapp-release.jks" \
            --storePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --alias="${alias}" \
            --password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          cp platforms/android/app/build/outputs/apk/release/app-release.apk litapp-nightly.apk

      - name: Publish nightly APK to GitHub Releases
        if: steps.android.outputs.sign == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly APK
          artifacts: litapp-nightly.apk
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record nightly Android manifest bump on integration branch
        if: steps.android.outputs.sign == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app.json src/providers/globals.ts config.xml package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(nightly): bump Android nightly version"

      - name: Push integration branch
        if: steps.android.outputs.sign == 'true'
        run: git push origin HEAD:fork/integration
