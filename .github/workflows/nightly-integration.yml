# Runs on push / workflow_dispatch for fork/integration.
# Daily trigger: default-branch workflow integration-ci-scheduled.yml dispatches this file on ref fork/integration.

name: Integration CI

on:
  push:
    branches:
      - 'fork/integration'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork/integration
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'push' && github.sha || 'fork/integration' }}

      - name: Detect Android signing (do not use secrets in step if)
        id: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain missing APK release (secrets)
        if: steps.android.outputs.sign != 'true'
        run: |
          echo "::notice::No GitHub Release/APK: add Actions secrets ANDROID_KEYSTORE_BASE64 (base64 .jks) and ANDROID_KEYSTORE_PASSWORD (store + key password; alias litapp unless ANDROID_KEY_ALIAS is set). Until then this job only validates the branch."

      - name: Export env for in-app update manifest
        shell: bash
        run: |
          echo "APP_JSON_RAW_BASE=https://raw.githubusercontent.com/${{ github.repository }}/fork/integration" >> "$GITHUB_ENV"
          echo "GITHUB_TAGS_REPO=${{ github.repository }}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '11.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Environment bootstrap (setup.js)
        run: npm run ionic:build:before

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run test:typing

      - name: Bump Android nightly version (before builds)
        if: steps.android.outputs.sign == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bash .github/scripts/bump-android-nightly.sh

      - name: Production build (sanity)
        run: npm run build

      - name: Setup Java (Android signing build)
        if: steps.android.outputs.sign == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        if: steps.android.outputs.sign == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android API 27 (Cordova 7)
        if: steps.android.outputs.sign == 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-27" "build-tools;27.0.3"

      - name: Decode Android keystore
        if: steps.android.outputs.sign == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/litapp-release.jks"

      - name: Cordova prepare Android
        if: steps.android.outputs.sign == 'true'
        run: ./node_modules/.bin/ionic cordova prepare android --no-interactive

      - name: Build Android release APK
        if: steps.android.outputs.sign == 'true'
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          alias="${KEY_ALIAS:-litapp}"
          ./node_modules/.bin/ionic cordova build android --prod --release --no-interactive -- -- \
            --minSdkVersion=19 \
            --keystore="${RUNNER_TEMP}/litapp-release.jks" \
            --storePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --alias="${alias}" \
            --password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          cp platforms/android/app/build/outputs/apk/release/app-release.apk litapp-nightly.apk

      - name: Publish nightly APK to GitHub Releases
        if: steps.android.outputs.sign == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly APK
          artifacts: litapp-nightly.apk
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record nightly Android manifest bump on integration branch
        if: steps.android.outputs.sign == 'true'
        run: |
          git add app.json src/providers/globals.ts config.xml package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(nightly): bump Android nightly version"

      - name: Push integration branch
        if: steps.android.outputs.sign == 'true'
        run: git push origin HEAD:fork/integration
